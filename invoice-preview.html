<style>
  body { font-family:'Inter',sans-serif; background:#F0F1F3; }
  .font-display { font-family:'Manrope',sans-serif; }
  .tnum { font-variant-numeric: tabular-nums; }

  /* Saat print/Save as PDF: sembunyikan semua UI kecuali dokumen invoice itu sendiri */
  @media print {
    header, #mobileActionBar, #loadingState, #notFoundState { display: none !important; }
    body { background: white !important; }
    #invoiceDocument { box-shadow: none !important; border-radius: 0 !important; margin: 0 !important; }
    .max-w-3xl { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }

    /* Fix garis tabel yang terputus/tidak rapi saat print —
       border-collapse memastikan garis antar sel menyatu jadi 1 garis solid,
       bukan 2 garis tipis berdempetan yang bisa terlihat putus-putus */
    table {
      border-collapse: collapse !important;
      border-spacing: 0 !important;
    }
    table, th, td {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
    }
    /* Pastikan border kotak formal dokumen juga tidak hilang/pudar saat print */
    .border-power-700, .border-2, .border-b-2, .border-t-2 {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
  }
</style>

  function terbilang(num) {
    num = Math.floor(Number(num) || 0);
    if (num === 0) return 'Nol';
    const satuan = ['', 'Satu', 'Dua', 'Tiga', 'Empat', 'Lima', 'Enam', 'Tujuh', 'Delapan', 'Sembilan', 'Sepuluh', 'Sebelas'];
    function convert(n) {
      if (n < 12) return satuan[n];
      if (n < 20) return convert(n - 10) + ' Belas';
      if (n < 100) return convert(Math.floor(n / 10)) + ' Puluh' + (n % 10 ? ' ' + convert(n % 10) : '');
      if (n < 200) return 'Seratus' + (n % 100 ? ' ' + convert(n % 100) : '');
      if (n < 1000) return convert(Math.floor(n / 100)) + ' Ratus' + (n % 100 ? ' ' + convert(n % 100) : '');
      if (n < 2000) return 'Seribu' + (n % 1000 ? ' ' + convert(n % 1000) : '');
      if (n < 1000000) return convert(Math.floor(n / 1000)) + ' Ribu' + (n % 1000 ? ' ' + convert(n % 1000) : '');
      if (n < 1000000000) return convert(Math.floor(n / 1000000)) + ' Juta' + (n % 1000000 ? ' ' + convert(n % 1000000) : '');

      <!-- Tanda tangan -->
      <div class="mt-7 flex flex-col items-start gap-0.5 text-[13px]">
        <p class="text-ink">Jakarta, ${tglFmt(inv.tanggal)}</p>
        ${biz.signature_url ? `
        <img src="${biz.signature_url}" alt="Tanda tangan" class="h-[5.5rem] ml-2 object-contain">
        ` : `<div class="h-16"></div>`}
        <p class="font-semibold text-ink border-t border-slate-300 pt-1.5 pr-10">Ahmad Ridho</p>
      </div>
    `;

    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('invoiceDocument').classList.remove('hidden');
    document.getElementById('mobileActionBar').classList.remove('hidden');

    // Tombol konversi cuma muncul untuk quotation yang belum pernah dikonversi
    if (isQuotation && inv.status !== 'converted') {
      document.getElementById('convertBtnDesktop').classList.remove('hidden');
      document.getElementById('convertBtnDesktop').classList.add('flex');
      document.getElementById('convertBtnMobile').classList.remove('hidden');
      document.getElementById('convertBtnMobile').classList.add('flex');
    }

    wireStatusDropdown(inv, isQuotation, badgeSet);
  }

  // ============================================
  // Dropdown ubah status (konfirmasi pembayaran, dll)
  // ============================================
  function wireStatusDropdown(inv, isQuotation, badgeSet) {
    const btn = document.getElementById('statusBadgeBtn');
    const dropdown = document.getElementById('statusDropdown');

    const optionKeys = isQuotation
      ? ['draft', 'sent', 'approved', 'rejected', 'expired']
      : ['draft', 'sent', 'paid', 'overdue'];

    dropdown.innerHTML = optionKeys.map(key => {
      const meta = badgeSet[key];
      const isCurrent = key === inv.status;
      return `
        <button data-status="${key}" class="status-option w-full flex items-center gap-2 px-3.5 py-2 text-xs font-medium text-left hover:bg-slate-50 transition ${isCurrent ? 'text-ink font-semibold' : 'text-slate'}">
          <span class="w-1.5 h-1.5 rounded-full ${meta.dot}"></span>
          ${meta.label}
          ${isCurrent ? '<svg class="ml-auto" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>' : ''}
        </button>`;
    }).join('');

    btn.onclick = (e) => {
      e.stopPropagation();
      dropdown.classList.toggle('hidden');
    };

    dropdown.querySelectorAll('.status-option').forEach(opt => {
      opt.onclick = async (e) => {
        e.stopPropagation();
        const newStatus = opt.dataset.status;
        dropdown.classList.add('hidden');
        if (newStatus === inv.status) return;

        const updatePayload = { status: newStatus };
        // Catat tanggal pembayaran otomatis begitu ditandai Lunas
        if (newStatus === 'paid') {
          updatePayload.tanggal_lunas = new Date().toISOString().slice(0, 10);
        }

        const { error } = await supabase.from('invoices').update(updatePayload).eq('id', inv.id).eq('access_code', APP_ID);
        if (error) {
          console.error(error);
          alert('Gagal update status. Coba lagi.');
          return;
        }
        // Reload data supaya badge & tanggal lunas ter-refresh
        load();
      };
    });

    // Klik di luar dropdown menutupnya — pasang cuma sekali, bukan tiap render
    if (!window.__statusDropdownOutsideClickWired) {
      document.addEventListener('click', () => {
        const dd = document.getElementById('statusDropdown');
        if (dd) dd.classList.add('hidden');
      });
      window.__statusDropdownOutsideClickWired = true;
    }
  }

  function buildWaMessage(inv) {
    const penerima = inv.customer_pic || inv.customer_nama || '';
    const msg = inv.doc_type === 'quotation'
      ? `Halo Pak/Bu ${penerima}, berikut penawaran harga servis genset ${inv.invoice_no} sebesar ${rupiah(inv.total)}, berlaku hingga ${tglFmt(inv.jatuh_tempo)}. Mohon dikonfirmasi ya. Terima kasih.`
      : `Halo ${penerima}, berikut invoice sebesar ${rupiah(inv.total)}. Mohon konfirmasi jika sudah dilakukan pembayaran. Terima kasih.`;
    return `https://wa.me/?text=${encodeURIComponent(msg)}`;
  }

  async function sendWhatsApp() {
    if (!currentInvoice) return;
    window.open(buildWaMessage(currentInvoice), '_blank');

    // Update status jadi "sent" kalau sebelumnya masih draft
    if (currentInvoice.status === 'draft') {
      await supabase.from('invoices').update({ status: 'sent' }).eq('id', currentInvoice.id);
    }
  }

  document.getElementById('waBtnDesktop').addEventListener('click', sendWhatsApp);
  document.getElementById('waBtnMobile').addEventListener('click', sendWhatsApp);

  // ============================================
  // Konversi Quotation → Invoice
  // ============================================
  async function convertToInvoice() {
    if (!currentInvoice) return;
    const btns = [document.getElementById('convertBtnDesktop'), document.getElementById('convertBtnMobile')];
    btns.forEach(b => { b.disabled = true; b.style.opacity = '0.6'; });

    try {
      // Tentukan nomor invoice baru menggunakan counter bersama (invoice + quotation),
      // konsisten dengan sistem seq_number yang dipakai Editor.
      const { data: settings } = await supabase
        .from('business_settings')
        .select('invoice_prefix, next_shared_number')
        .eq('access_code', APP_ID)
        .maybeSingle();
      const invPrefix = settings?.invoice_prefix || 'INV-SRV-';

      let candidate = settings?.next_shared_number || 11;
      const { data: existingSeqs } = await supabase
        .from('invoices')
        .select('seq_number')
        .eq('access_code', APP_ID);
      const takenSeqs = new Set((existingSeqs || []).map(r => r.seq_number).filter(n => n != null));
      while (takenSeqs.has(candidate)) candidate++;

      const romanMonths = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'];
      const now = new Date();
      const newInvoiceNo = `${invPrefix}${String(candidate).padStart(4,'0')}/${romanMonths[now.getMonth()]}/${String(now.getFullYear()).slice(-2)}`;

      await supabase.from('business_settings').update({ next_shared_number: candidate + 1 }).eq('access_code', APP_ID);

      // Salin semua data quotation ini jadi invoice baru
      const { data: newInvoice, error } = await supabase
        .from('invoices')
        .insert({
          access_code: APP_ID,
          invoice_no: newInvoiceNo,
          seq_number: candidate,
          doc_type: 'invoice',
          status: 'draft',
          tanggal: new Date().toISOString().slice(0, 10),
          jatuh_tempo: currentInvoice.jatuh_tempo,
          customer_nama: currentInvoice.customer_nama,
          customer_hp: currentInvoice.customer_hp,
          customer_pic: currentInvoice.customer_pic,
          jenis_servis: currentInvoice.jenis_servis,
          unit_genset: currentInvoice.unit_genset,
          deskripsi: currentInvoice.deskripsi,
          lokasi: currentInvoice.lokasi,
          jasa_desc: currentInvoice.jasa_desc,
          jasa_harga: currentInvoice.jasa_harga,
          spareparts: currentInvoice.spareparts,
          dp_tipe: currentInvoice.dp_tipe,
          dp_nilai: currentInvoice.dp_nilai,
          dp_jumlah: currentInvoice.dp_jumlah,
          potongan_tipe: currentInvoice.potongan_tipe,
          potongan_nilai: currentInvoice.potongan_nilai,
          potongan_harga: currentInvoice.potongan_harga,
          catatan: currentInvoice.catatan,
          subtotal: currentInvoice.subtotal,
          total: currentInvoice.total
        })
        .select('id')
        .single();

      if (error) throw error;

      // Tandai quotation ini sebagai sudah dikonversi
      await supabase.from('invoices')
        .update({ status: 'converted', converted_to: newInvoiceNo })
        .eq('id', currentInvoice.id);

      // Langsung buka invoice baru yang dihasilkan
      window.location.href = `invoice-preview.html?id=${newInvoice.id}`;

    } catch (err) {
      console.error(err);
      alert('Gagal mengonversi ke invoice. Coba lagi.');
      btns.forEach(b => { b.disabled = false; b.style.opacity = '1'; });
    }
  }

  document.getElementById('convertBtnDesktop').addEventListener('click', convertToInvoice);
  document.getElementById('convertBtnMobile').addEventListener('click', convertToInvoice);

  // ============================================
  // Hapus invoice — dengan modal konfirmasi
  // ============================================
  function openDeleteModal() {
    if (!currentInvoice) return;
    document.getElementById('deleteModalInvoiceNo').textContent = currentInvoice.invoice_no;
    document.getElementById('deleteModal').classList.remove('hidden');
  }
  function closeDeleteModal() {
    document.getElementById('deleteModal').classList.add('hidden');
  }

  document.getElementById('deleteBtnDesktop').addEventListener('click', openDeleteModal);
  document.getElementById('deleteBtnMobile').addEventListener('click', openDeleteModal);
  document.getElementById('deleteModalCancel').addEventListener('click', closeDeleteModal);

  document.getElementById('deleteModalConfirm').addEventListener('click', async () => {
    if (!currentInvoice) return;
    const btn = document.getElementById('deleteModalConfirm');
    btn.textContent = 'Menghapus...';
    btn.disabled = true;

    const { error } = await supabase.from('invoices').delete().eq('id', currentInvoice.id).eq('access_code', APP_ID);

    if (error) {
      console.error(error);
      btn.textContent = 'Ya, Hapus';
      btn.disabled = false;
      alert('Gagal menghapus invoice. Coba lagi.');
      return;
    }

    window.location.href = 'invoice-history.html';
  });

  async function load() {
    if (!invoiceId) {
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('notFoundState').classList.remove('hidden');
      return;
    }

    const [invoiceResult, settingsResult] = await Promise.all([
      supabase.from('invoices').select('*').eq('id', invoiceId).eq('access_code', APP_ID).maybeSingle(),
      supabase.from('business_settings').select('*').eq('access_code', APP_ID).maybeSingle()
    ]);

    if (invoiceResult.error || !invoiceResult.data) {
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('notFoundState').classList.remove('hidden');
      return;
    }

    renderDocument(invoiceResult.data, settingsResult.data || {});
  }

  load();
})();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .then((reg) => console.log('Service worker aktif:', reg.scope))
        .catch((err) => console.warn('Service worker gagal daftar:', err));
    });
  }
</script>

</body>
